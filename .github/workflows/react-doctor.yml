name: React Doctor

on:
  pull_request:
    branches: ['main', 'develop']

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run React Doctor
        run: |
          npx -y react-doctor@latest . --verbose > react-doctor-report.txt 2>&1 || true

      - name: Comment PR with report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('react-doctor-report.txt', 'utf8');
            const truncated = report.length > 60000
              ? report.substring(0, 60000) + '\n\n... (reporte truncado por longitud)'
              : report;
            const body = [
              '## 🩺 React Doctor Report',
              '',
              '<details>',
              '<summary>Ver diagnóstico completo</summary>',
              '',
              '```',
              truncated,
              '```',
              '</details>',
              '',
              '> Generado automáticamente en cada PR hacia `main` o `develop`',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
